<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像加工アプリ (Web版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        canvas { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        
        /* カラーピッカーのカスタマイズ */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full text-center">
        <!-- タイトル変更 -->
        <h1 class="text-2xl font-bold mb-2 text-gray-800">LINE文字入りアイコンメーカー</h1>
        <p class="text-gray-600 mb-6 text-sm">Python版と同じロジックでブラウザ処理します</p>

        <!-- コントロールエリア -->
        <div class="mb-6 space-y-4">
            <!-- ファイル選択 -->
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-lg p-6 bg-gray-50 hover:bg-gray-100 transition">
                <label for="fileInput" class="cursor-pointer">
                    <span class="bg-blue-500 text-white px-4 py-2 rounded-full font-bold shadow hover:bg-blue-600 transition">画像を選択 (sea.jpg)</span>
                    <input type="file" id="fileInput" accept="image/jpeg, image/png" class="hidden">
                </label>
                <p class="text-xs text-gray-400 mt-2">※画像はサーバーに送信されず、お使いのブラウザ内で処理されます</p>
            </div>

            <!-- カラーテーマ選択 (カテゴリ分け) -->
            <div class="text-left bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-sm font-bold text-gray-700 mb-3">カラーテーマ選択</label>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- 青系 -->
                    <div>
                        <span class="text-xs font-bold text-blue-600 block mb-1">🟦 ITスキル・学習</span>
                        <div class="flex space-x-2">
                            <button class="w-8 h-8 rounded-full bg-[#00d2fc] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-cyan-400" onclick="changeColor('#00d2fc')" title="サイバーブルー"></button>
                            <button class="w-8 h-8 rounded-full bg-[#2563eb] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-blue-600" onclick="changeColor('#2563eb')" title="鮮やかな青"></button>
                        </div>
                    </div>

                    <!-- オレンジ系 -->
                    <div>
                        <span class="text-xs font-bold text-orange-600 block mb-1">🟧 クリエイティブ</span>
                        <div class="flex space-x-2">
                            <button class="w-8 h-8 rounded-full bg-[#f97316] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-orange-500" onclick="changeColor('#f97316')" title="鮮やかなオレンジ"></button>
                            <button class="w-8 h-8 rounded-full bg-[#b45309] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-amber-700" onclick="changeColor('#b45309')" title="落ち着いたアンバー"></button>
                        </div>
                    </div>

                    <!-- 緑/ピンク系 -->
                    <div>
                        <span class="text-xs font-bold text-green-600 block mb-1">🟩 コミュニティ支援</span>
                        <div class="flex space-x-2">
                            <button class="w-8 h-8 rounded-full bg-[#84cc16] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-lime-500" onclick="changeColor('#84cc16')" title="明るいライムグリーン"></button>
                            <button class="w-8 h-8 rounded-full bg-[#166534] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-green-800" onclick="changeColor('#166534')" title="深緑"></button>
                            <button class="w-8 h-8 rounded-full bg-[#f472b6] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-pink-400" onclick="changeColor('#f472b6')" title="優しいピンク"></button>
                        </div>
                    </div>

                    <!-- 赤/金系 -->
                    <div>
                        <span class="text-xs font-bold text-red-600 block mb-1">🟥 特別枠・ビジネス</span>
                        <div class="flex space-x-2">
                            <button class="w-8 h-8 rounded-full bg-[#dc2626] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-red-600" onclick="changeColor('#dc2626')" title="鮮やかな赤"></button>
                            <button class="w-8 h-8 rounded-full bg-[#d4af37] hover:scale-110 transition shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-yellow-500" onclick="changeColor('#d4af37')" title="リッチなゴールド"></button>
                        </div>
                    </div>
                </div>

                <!-- その他・カスタム -->
                <div class="mt-4 pt-3 border-t border-gray-200 flex items-center justify-between">
                    <span class="text-xs text-gray-500">その他・微調整</span>
                    <div class="flex items-center space-x-2">
                        <span class="text-xs text-gray-400">カスタム</span>
                        <input type="color" id="colorPicker" value="#2563eb" title="カスタムカラー">
                    </div>
                </div>
            </div>

            <!-- テキスト入力 -->
            <div class="text-left">
                <label for="textInput" class="block text-sm font-medium text-gray-700 mb-1 ml-1">重ねる文字 (改行可)</label>
                <textarea id="textInput" rows="2" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none text-center font-bold text-gray-700" placeholder="テキストを入力">ルーム名</textarea>
                <p class="text-xs text-gray-400 mt-1 ml-1">※文字は自動的に中央の枠（150x150px）に収まるよう調整されます</p>
            </div>
            
            <div id="downloadArea" class="hidden">
                <button id="downloadBtn" class="bg-green-500 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-green-600 transition flex items-center justify-center mx-auto w-full sm:w-auto">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    画像をダウンロード
                </button>
            </div>
        </div>

        <!-- キャンバス表示エリア -->
        <div class="flex justify-center">
            <canvas id="mainCanvas" width="480" height="480" class="bg-gray-200 rounded"></canvas>
        </div>
    </div>

    <script>
        // ==========================================
        // 設定
        // ==========================================
        // 初期値を「鮮やかな青」に変更
        let userColor = { r: 37, g: 99, b: 235 }; // #2563eb
        const CANVAS_SIZE = 480;
        const PHOTO_SIZE = 380;
        const TEXT_LIMIT_W = 150; // 固定サイズ
        const TEXT_LIMIT_H = 150; // 固定サイズ
        const FILTER_ALPHA = 76 / 255; // 約0.3

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const textInput = document.getElementById('textInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadArea = document.getElementById('downloadArea');
        const colorPicker = document.getElementById('colorPicker');

        let currentImg = null; // 現在読み込まれている画像を保持

        // 初期表示
        updateCanvasBackground();
        ctx.fillStyle = "white";
        ctx.font = "20px 'Noto Sans JP'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("画像を選択してください", CANVAS_SIZE/2, CANVAS_SIZE/2);

        // ファイル選択時の処理
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImg = img; // 画像を保持
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // テキスト変更時の処理
        textInput.addEventListener('input', () => {
            if (currentImg) processImage();
        });

        // カラーピッカー変更時の処理
        colorPicker.addEventListener('input', (e) => {
            changeColor(e.target.value);
        });

        // ダウンロード処理
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'icon_design.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // カラー変更ヘルパー関数
        window.changeColor = function(hex) {
            // Hex(#RRGGBB) to RGB
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            
            userColor = { r, g, b };
            colorPicker.value = hex; // ピッカーの表示も同期

            if (currentImg) {
                processImage();
            } else {
                updateCanvasBackground();
                ctx.fillStyle = "white";
                ctx.font = "20px 'Noto Sans JP'";
                ctx.textAlign = "center";
                ctx.fillText("画像を選択してください", CANVAS_SIZE/2, CANVAS_SIZE/2);
            }
        };

        function updateCanvasBackground() {
             ctx.fillStyle = `rgb(${userColor.r}, ${userColor.g}, ${userColor.b})`;
             ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        }

        // ==========================================
        // 画像加工処理
        // ==========================================
        function processImage() {
            if (!currentImg) return;
            const img = currentImg;

            // 1. キャンバス作成（背景塗りつぶし）
            updateCanvasBackground();

            const centerX = CANVAS_SIZE / 2;
            const centerY = CANVAS_SIZE / 2;

            // -------------------------------------------------
            // 2. 写真の円形配置
            // -------------------------------------------------
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = PHOTO_SIZE;
            tempCanvas.height = PHOTO_SIZE;
            const tCtx = tempCanvas.getContext('2d');

            // アスペクト比維持で中央クロップ
            const aspect = img.width / img.height;
            let srcX, srcY, srcW, srcH;

            if (aspect > 1) {
                srcH = img.height;
                srcW = img.height;
                srcX = (img.width - img.height) / 2;
                srcY = 0;
            } else {
                srcW = img.width;
                srcH = img.width;
                srcX = 0;
                srcY = (img.height - img.width) / 2;
            }

            // 円形パスを作成
            tCtx.beginPath();
            tCtx.arc(PHOTO_SIZE/2, PHOTO_SIZE/2, PHOTO_SIZE/2, 0, Math.PI * 2);
            tCtx.closePath();
            tCtx.clip();

            // 画像を描画
            tCtx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, PHOTO_SIZE, PHOTO_SIZE);

            // -------------------------------------------------
            // 3. カラーフィルター（透かし処理）
            // -------------------------------------------------
            tCtx.globalCompositeOperation = 'source-over';
            tCtx.fillStyle = `rgba(${userColor.r}, ${userColor.g}, ${userColor.b}, ${FILTER_ALPHA})`;
            tCtx.fill();

            // メインキャンバスの中央に配置
            const pasteX = (CANVAS_SIZE - PHOTO_SIZE) / 2;
            const pasteY = (CANVAS_SIZE - PHOTO_SIZE) / 2;
            ctx.drawImage(tempCanvas, pasteX, pasteY);

            // -------------------------------------------------
            // 4. 文字入れ（ユーザー入力テキストを使用）
            // -------------------------------------------------
            const userText = textInput.value || " ";
            drawResponsiveText(ctx, userText, centerX, centerY, TEXT_LIMIT_W, TEXT_LIMIT_H);

            // ダウンロードボタン表示
            downloadArea.classList.remove('hidden');
        }

        function drawResponsiveText(ctx, text, x, y, maxWidth, maxHeight) {
            let fontSize = 200; // 開始サイズ
            const lines = text.split('\n');
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeStyle = "black";
            ctx.lineJoin = "round";

            // ループでサイズ縮小（指定枠に収まるまで）
            while (fontSize > 5) {
                ctx.font = `bold ${fontSize}px 'Noto Sans JP', sans-serif`;
                const strokeWidth = fontSize * 0.1;
                
                // バウンディングボックス計算
                let maxLineWidth = 0;
                let totalHeight = 0;
                const lineHeight = fontSize * 1.2;

                lines.forEach(line => {
                    const metrics = ctx.measureText(line);
                    const w = metrics.width + strokeWidth; 
                    if (w > maxLineWidth) maxLineWidth = w;
                });
                totalHeight = (lines.length * lineHeight) - (lineHeight - fontSize) + strokeWidth; 

                // 範囲内ならループ終了
                if (maxLineWidth <= maxWidth && totalHeight <= maxHeight) {
                    break;
                }
                fontSize--;
            }

            // 決定したサイズで描画
            ctx.lineWidth = fontSize * 0.1;
            const lineHeight = fontSize * 1.2;
            const totalTextHeight = lines.length * lineHeight;
            
            // 複数行の中央配置計算
            let startY = y - (totalTextHeight / 2) + (lineHeight / 2);

            lines.forEach((line, i) => {
                const drawY = startY + (i * lineHeight);
                ctx.strokeText(line, x, drawY);
                ctx.fillText(line, x, drawY);
            });
        }
    </script>
</body>
</html>
